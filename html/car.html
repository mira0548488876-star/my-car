<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <title>רכב בודד</title> 
  <link rel="stylesheet" href="../css/header-footer.css" />
  <link rel="stylesheet" href="../css/car.css" />
  <link rel="stylesheet" href="../css/contact-us.css">
  <link rel="icon" href="../images/icons/icon_homepage.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

  <header id="main-header" class="top-bar"></header>

  <main class="page">
      <div class="item-card">
          <div class="item-image">
              <img src="" alt="" class="item-img">
          </div>

          <div class="item-content">
              <h1 class="item-title"></h1>
              
              <div class="item-price">מחיר: <span></span></div>
              
              <p class="item-description"></p>
              
              <div class="seller-info-box">
                  <h3>פרטי המוכר</h3>
                  <p><strong>שם המוכר:</strong> <span id="seller-name"></span></p>
                  <p><strong>טלפון ליצירת קשר:</strong> <span id="seller-phone"></span></p>
                  <p><strong>מצב הרכב:</strong> <span id="car-state"></span></p>
              </div>
          </div>
          <a href="contact-us.html" class="btn-primary" >המשך לקניה</a>
           
      </div>
  </main>

  <footer id="main-footer"></footer>

  <script src="../js/header-footer.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/car.js"></script>
  <script src="../js/contact-us.js"></script>
</body>
</html>
