<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>התחברות למערכת</title>
    <link rel="stylesheet" href="../css/header-footer.css">
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>
<body>

    <header id="main-header" class="top-bar"></header>

    <main>
        <div class="login-container">
            <h2>התחברות</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">שם משתמש:</label>
                    <input type="text" id="username" required placeholder="user">
                </div>
                <div class="form-group">
                    <label for="password">סיסמה:</label>
                    <input type="password" id="password" required placeholder="1234">
                </div>
                <button type="submit" class="login-btn">התחבר</button>
                <p id="error-message" class="error-msg"></p>
            </form>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="../js/login.js"></script>
    <script src="../js/header-footer.js"></script>
</body>
</html>
